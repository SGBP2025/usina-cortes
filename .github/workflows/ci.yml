name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-web:
    name: Lint + Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usina-saas

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: usina-saas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check + Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: https://usina-cortes.vercel.app

  lint-worker:
    name: Lint + Build (Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usina-saas/worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: usina-saas/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (Worker)
        run: npm run typecheck

      - name: Run tests (passthrough se nenhum existir)
        run: npm test -- --passWithNoTests 2>/dev/null || true
